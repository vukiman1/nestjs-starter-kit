services:
  db:
    image: postgres:16-alpine
    container_name: nest-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nestdb
    ports:
      - '5432:5432'
    volumes:
      - ./docker/data/db:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nest-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - ./docker/data/redis:/data

